<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuyoo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;text-align:center;padding-bottom:120px}
.artwork{width:100%;max-width:380px;aspect-ratio:1/1;margin:12px auto 0;border-radius:22px;overflow:hidden;border:1px solid #222}
.artwork img{width:100%;height:100%;object-fit:cover}
.controls{max-width:380px;margin:20px auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
/* BOTONES BLANCOS */
.btn{width:44px;height:44px;background:none;border:none;display:flex;align-items:center;justify-content:center}
.btn svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:0.9}
/* BOTON VERDE CENTRADO PERFECTO */
.play{width:62px;height:62px;background:#00ff88;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,255,136,0.5)}
.play svg{width:28px;height:28px;fill:#000;margin-left:3px}
.bar-wrap{max-width:380px;margin:0 auto;padding:0 20px}.bar{height:3px;background:#222;border-radius:10px}.fill{width:30%;height:100%;background:#00ff88}
</style>
</head>
<body>

<div class="artwork"><img src="../logo.png" onerror="this.src='logo.png'"></div>
<h1 style="margin-top:16px;font-size:24px">Nuyoo</h1>
<p style="color:#888;font-size:14px">Spike Black</p>

<div class="controls">
  <!-- RANDOM -->
  <button class="btn">
    <svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20l5-5M21 3l-7 7M16 21h5v-5M4 4l5 5M21 21l-7-7"/></svg>
  </button>

  <!-- CORAZON -->
  <button class="btn">
    <svg viewBox="0 0 24 24"><path d="M12 20l-1.5-1.4C6 14.5 2.5 12 2.5 8.5A4 4 0 0 1 6.5 4a4 4 0 0 1 3.5 1.8A4 4 0 0 1 13.5 4 4 4 0 0 1 17.5 8.5c0 3.5-3.5 6-8 10.1L12 20z"/></svg>
  </button>

  <!-- PLAY VERDE ARREGLADO -->
  <button class="play">
    <svg viewBox="0 0 24 24"><path d="M7 5.5v13L17 12z"/></svg>
  </button>

  <!-- REPEAT -->
  <button class="btn">
    <svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
  </button>
</div>

<div class="bar-wrap"><div class="bar"><div class="fill"></div></div></div>

</body>
</html>
