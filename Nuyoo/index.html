<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuyoo - Spike Black</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;overflow-x:hidden}
.top{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.artwork{width:85vw;max-width:380px;aspect-ratio:1/1;border-radius:20px;overflow:hidden;box-shadow:0 0 50px rgba(0,255,136,0.6),0 0 100px rgba(0,255,136,0.3),0 20px 60px rgba(0,0,0,0.8);border:1.5px solid #00ff88;position:relative}
.artwork img{width:100%;height:100%;object-fit:cover}
.play-float{position:absolute;bottom:15px;right:15px;width:56px;height:56px;background:#00ff88;border-radius:50%;border:none;color:#000;font-size:24px;box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 20px #00ff88;cursor:pointer;display:flex;align-items:center;justify-content:center}
.info{margin-top:25px;text-align:left;width:85vw;max-width:380px}
.info h1{font-size:32px;font-weight:800;letter-spacing:-0.8px}
.info p{color:#a1a1a6;font-size:16px;margin-top:4px}
.info span{color:#00ff88;font-size:13px;letter-spacing:1px;font-weight:700}
.controls{width:85vw;max-width:380px;margin-top:25px}
.bar{width:100%;height:4px;background:#2c2c2e;border-radius:10px;overflow:hidden}
.fill{width:32%;height:100%;background:#00ff88;box-shadow:0 0 10px #00ff88}
.time{display:flex;justify-content:space-between;color:#86868b;font-size:11px;margin-top:6px}
.lyrics{width:85vw;max-width:380px;margin:40px auto;text-align:left;background:rgba(28,28,30,0.8);border-radius:18px;padding:20px;border:1px solid rgba(255,255,255,0.08)}
.lyrics h3{font-size:14px;letter-spacing:1px;color:#86868b;margin-bottom:12px}
.lyrics p{line-height:1.8;color:#f5f5f7}
.player-bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,20,0.85);backdrop-filter:blur(25px);border-top:1px solid rgba(255,255,255,0.1);padding:10px 15px;display:flex;align-items:center;gap:12px}
.mini{width:48px;height:48px;border-radius:8px;overflow:hidden;border:1px solid #00ff88;box-shadow:0 0 10px rgba(0,255,136,0.4)}
.mini img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div class="top">
  <div class="artwork">
    <img src="../logo.png" onerror="this.src='logo.png'">
    <button class="play-float" onclick="toggle()">▶</button>
  </div>
  <div class="info">
    <h1>Nuyoo</h1>
    <p>Spike Black</p>
    <span>SINGLE • 2024 • DARK CIRCLE</span>
  </div>
  <div class="controls">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="time"><span id="cur">0:32</span><span>-2:18</span></div>
  </div>
  <div class="lyrics">
    <h3>LETRAS</h3>
    <p>En la sombra donde nadie va...<br>El fantasma brilla en neón...<br>Ghost Dark Circle no muere...</p>
  </div>
  <div style="height:80px"></div>
</div>

<div class="player-bottom">
  <div class="mini"><img src="../logo.png" onerror="this.src='logo.png'"></div>
  <div style="flex:1;text-align:left"><b style="font-size:14px">Nuyoo</b><br><span style="color:#86868b;font-size:12px">Spike Black</span></div>
  <button onclick="toggle()" style="background:#00ff88;border:none;width:36px;height:36px;border-radius:50%;font-weight:900">▶</button>
</div>

<audio id="audio" src="nuyoo.mp3"></audio>
<script>
let playing=false;
const a=document.getElementById('audio');
function toggle(){
  if(!playing){a.play();playing=true;document.querySelectorAll('button').forEach(b=>b.innerHTML='⏸')}else{a.pause();playing=false;document.querySelectorAll('button').forEach(b=>b.innerHTML='▶')}
}
</script>
</body>
</html>
