<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOST DARK CIRCLE - Spike Black</title>
<style>
:root{--neon:#00ff41;--red:#ff0000;--bg:#000}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#e0e0e0;font-family:Consolas,monospace;padding:15px}
header{text-align:center;padding:20px 0;border-bottom:1px solid #222;margin-bottom:20px}
header h1{color:var(--red);letter-spacing:2px;text-shadow:0 0 10px var(--red)}
.card{background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 0 15px rgba(0,0,0,.5)}
.card h2{text-align:center;font-size:16px;margin-bottom:15px;letter-spacing:1px}
input,textarea{width:100%;background:#000;border:1px solid #333;color:#fff;padding:12px;border-radius:10px;margin-bottom:10px;outline:none;font-family:Consolas,monospace}
input:focus,textarea:focus{border-color:var(--neon);box-shadow:0 0 8px var(--neon)}
.btn{width:100%;border:none;padding:13px;border-radius:10px;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:.2s}
.btn-red{background:var(--red);color:#fff;box-shadow:0 0 12px var(--red)}
.btn-green{background:var(--neon);color:#000;box-shadow:0 0 12px var(--neon)}
.btn:hover{transform:scale(1.02);filter:brightness(1.2)}
.post-item{border-left:3px solid var(--neon);background:#111;padding:12px;border-radius:6px;margin-top:12px;animation:fade.3s}
.post-item.red{border-left-color:var(--red)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.visitas{text-align:center;color:var(--neon);text-shadow:0 0 8px var(--neon);margin-top:10px;font-size:14px}
</style>
</head>
<body>

<header>
<h1>👻 GHOST DARK CIRCLE</h1>
<p style="color:#666;font-size:11px;letter-spacing:3px;">SPIKE BLACK - GHOST DARK CIRCLE © 2026</p>
</header>

<!-- MURO DE SPIKE -->
<div class="card">
<h2 style="color:var(--red);">📢 MURO DE SPIKE</h2>
<input id="muro-nombre" type="text" placeholder="Tu placa aca">
<textarea id="muro-texto" placeholder="¿Qué quieres publicar hoy?"></textarea>
<input id="muro-file" type="file" accept="image/*" style="border:none;padding:5px;">
<button class="btn btn-red" onclick="publicarMuro()">PUBLICAR EN EL MURO</button>
<div id="muro-lista"></div>
</div>

<!-- LIBRO DE VISITAS - YA ARREGLADO -->
<div class="card">
<h2 style="color:var(--red);">📖 LIBRO DE VISITAS</h2>
<input id="visita-nombre" type="text" placeholder="Tu placa / aka">
<textarea id="visita-mensaje" placeholder="Deja tu mensaje..."></textarea>
<button class="btn btn-green" onclick="firmarLibro()">Firmar muro</button>
<div id="visita-lista"></div>
</div>

<a href="https://wa.me/5210000000000" target="_blank" style="text-decoration:none;">
<div class="card" style="background:linear-gradient(90deg,#00a884,#00ff41);text-align:center;padding:14px;border:none;">
<span style="color:#000;font-weight:bold;">💬 WHATSAPP</span>
</div>
</a>

<p class="visitas">👁️ VISITAS: <span id="contador">36</span></p>

<script>
// CONTADOR VISITAS
let c = localStorage.getItem('visitas_ghost') || 36;
c = parseInt(c)+1;
localStorage.setItem('visitas_ghost', c);
document.getElementById('contador').textContent = c;

// MURO DE SPIKE - FUNCIONA
function publicarMuro(){
  const nombre = document.getElementById('muro-nombre').value.trim() || 'Anónimo';
  const texto = document.getElementById('muro-texto').value.trim();
  const fileInput = document.getElementById('muro-file');
  if(!texto &&!fileInput.files[0]){ alert('Escribe algo o sube imagen'); return; }

  const reader = new FileReader();
  const guardar = (imgData) => {
    let posts = JSON.parse(localStorage.getItem('muro_spike') || '[]');
    posts.unshift({nombre, texto, img: imgData, fecha: new Date().toLocaleString()});
    localStorage.setItem('muro_spike', JSON.stringify(posts));
    document.getElementById('muro-nombre').value=''; document.getElementById('muro-texto').value=''; fileInput.value='';
    mostrarMuro();
  };

  if(fileInput.files[0]){
    reader.onload = e => guardar(e.target.result);
    reader.readAsDataURL(fileInput.files[0]);
  } else { guardar(''); }
}

function mostrarMuro(){
  let posts = JSON.parse(localStorage.getItem('muro_spike') || '[]');
  document.getElementById('muro-lista').innerHTML = posts.map(p=>`
    <div class="post-item red">
      <p style="color:var(--neon);font-weight:bold;">${p.nombre} <span style="color:#666;font-size:10px;">${p.fecha}</span></p>
      <p style="margin:6px 0;">${p.texto}</p>
      ${p.img? `<img src="${p.img}" style="width:100%;border-radius:8px;margin-top:8px;border:1px solid #333;">` : ''}
    </div>
  `).join('');
}

// LIBRO DE VISITAS - AHORA SI FIRMA
function firmarLibro(){
  const nombre = document.getElementById('visita-nombre').value.trim();
  const mensaje = document.getElementById('visita-mensaje').value.trim();
  if(!nombre ||!mensaje){ alert('Pon tu placa y tu mensaje'); return; }

  let visitas = JSON.parse(localStorage.getItem('libro_visitas') || '[]');
  visitas.unshift({nombre, mensaje, fecha: new Date().toLocaleString()});
  localStorage.setItem('libro_visitas', JSON.stringify(visitas));
  document.getElementById('visita-nombre').value=''; document.getElementById('visita-mensaje').value='';
  mostrarLibro();
}

function mostrarLibro(){
  let visitas = JSON.parse(localStorage.getItem('libro_visitas') || '[]');
  document.getElementById('visita-lista').innerHTML = visitas.map(v=>`
    <div class="post-item">
      <p style="color:var(--neon);font-weight:bold;">${v.nombre} <span style="color:#666;font-size:10px;">${v.fecha}</span></p>
      <p style="margin-top:5px;color:#ccc;">${v.mensaje}</p>
    </div>
  `).join('');
}

mostrarMuro();
mostrarLibro();
</script>
</body>
</html>
