<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Dark Circle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Consolas,monospace;padding:12px}
.card{background:#050505;border:1px solid #222;border-radius:18px;padding:18px;margin-bottom:16px}
.card h2{text-align:center;color:#ff0a1a;font-size:18px;letter-spacing:1px;margin-bottom:16px;font-weight:bold}
input,textarea{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;color:#aaa;padding:14px 16px;border-radius:12px;margin-bottom:12px;outline:none;font-size:14px}
.btn{width:100%;border:none;padding:14px;border-radius:12px;font-weight:bold;cursor:pointer;font-size:14px;letter-spacing:1px}
.btn-red{background:#e30613;color:#fff}
.btn-green{background:#00e676;color:#000}
.post{border:1px solid #2a2a2a;border-left:3px solid #00e676;border-radius:12px;padding:12px;margin-top:12px;background:#080808}
.whatsapp{background:linear-gradient(90deg,#25d366,#128c7e);color:#fff;padding:14px;border-radius:25px;text-align:center;font-weight:bold;margin-top:8px;display:block;text-decoration:none}
.visitas{text-align:center;color:#00e676;text-shadow:0 0 10px #00e676;margin:12px 0;font-size:14px;font-weight:bold}
.footer{text-align:center;color:#333;font-size:11px;margin-top:20px}
</style>
</head>
<body>

<div class="card">
<h2>📢 MURO DE SPIKE</h2>
<input id="muro-nombre" type="text" placeholder="Tu placa aca">
<textarea id="muro-texto" placeholder="¿Qué quieres publicar hoy?"></textarea>
<div style="background:#0e0e0e;border:1px solid #2a2a2a;border-radius:12px;padding:10px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
<input id="muro-file" type="file" style="display:none">
<button onclick="document.getElementById('muro-file').click()" style="background:#fff;color:#000;border:1px solid #999;padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer">Seleccionar archivo</button>
<span id="file-name" style="color:#aaa;font-size:12px">Sin archivos seleccionados</span>
</div>
<button class="btn btn-red" onclick="publicarMuro()">PUBLICAR EN EL MURO</button>
<div id="muro-lista"></div>
</div>

<div class="card">
<h2>📖 LIBRO DE VISITAS</h2>
<input id="visita-nombre" type="text" placeholder="Tu placa / aca">
<textarea id="visita-mensaje" placeholder="Deja tu mensaje..."></textarea>
<button class="btn btn-green" onclick="firmarLibro()">Firmar muro</button>
<div id="visita-lista"></div>
</div>

<a class="whatsapp" href="https://wa.me/5210000000000" target="_blank">💬 WHATSAPP</a>
<div class="visitas">👁️ VISITAS: <span id="contador">36</span></div>
<div class="footer">Spike Black - Ghost Dark Circle © 2026</div>

<script>
// Mostrar nombre de archivo
document.getElementById('muro-file').addEventListener('change', function(){
  document.getElementById('file-name').textContent = this.files[0]? this.files[0].name : 'Sin archivos seleccionados';
});

// CONTADOR
let visitas = localStorage.getItem('visitas_ghost');
if(!visitas){ visitas = 36; } else { visitas = parseInt(visitas)+1; }
localStorage.setItem('visitas_ghost', visitas);
document.getElementById('contador').textContent = visitas;

// MURO DE SPIKE - TU CÓDIGO ORIGINAL (INTACTO)
function publicarMuro(){
  const nombre = document.getElementById('muro-nombre').value.trim() || 'Ghost';
  const texto = document.getElementById('muro-texto').value.trim();
  if(!texto){ alert('Escribe algo'); return; }
  let posts = JSON.parse(localStorage.getItem('muro_spike') || '[{"nombre":"Ghost","texto":"ola"}]');
  posts.unshift({nombre, texto});
  localStorage.setItem('muro_spike', JSON.stringify(posts));
  document.getElementById('muro-texto').value='';
  mostrarMuro();
}
function mostrarMuro(){
  let posts = JSON.parse(localStorage.getItem('muro_spike') || '[{"nombre":"Ghost","texto":"ola"}]');
  document.getElementById('muro-lista').innerHTML = posts.map(p=>`
    <div class="post"><p style="color:#00e676;font-weight:bold;font-size:14px">${p.nombre}</p><p style="margin-top:4px;color:#ccc;font-size:14px">${p.texto}</p></div>
  `).join('');
}

// LIBRO DE VISITAS - AHORA SI FUNCIONA (CORRECCIÓN ÚNICA)
function firmarLibro(){
  const nombre = document.getElementById('visita-nombre').value.trim();
  const mensaje = document.getElementById('visita-mensaje').value.trim();
  if(!nombre ||!mensaje){ alert('Pon tu placa y mensaje'); return; }
  let lista = JSON.parse(localStorage.getItem('libro_visitas') || '[]');
  lista.unshift({nombre, mensaje});
  localStorage.setItem('libro_visitas', JSON.stringify(lista));
  document.getElementById('visita-nombre').value='';
  document.getElementById('visita-mensaje').value='';
  mostrarLibro();
}
function mostrarLibro(){
  let lista = JSON.parse(localStorage.getItem('libro_visitas') || '[]');
  document.getElementById('visita-lista').innerHTML = lista.map(v=>`
    <div class="post" style="border-left-color:#00e676"><p style="color:#00e676;font-weight:bold;font-size:14px">${v.nombre}</p><p style="margin-top:4px;color:#ccc;font-size:14px">${v.mensaje}</p></div>
  `).join('');
}

mostrarMuro();
mostrarLibro();
</script>
</body>
</html>
