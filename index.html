<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOST DARK CIRCLE - Spike Black</title>
<style>
    * { box-sizing: border-box; }
  html, body {
    background: #000000 !important;
    background-color: #000000 !important;
    margin: 0;
    padding: 0;
    color: white;
    font-family: Arial, sans-serif;
  }
  body { padding: 15px; text-align: center; }
  .logo-wrap {
    width: 280px; height: 280px; margin: 20px auto;
    border-radius: 50%; box-shadow: 0 0 35px #00ff88;
    background: #000;
  }
  .logo-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  h1 { color: #ff1a1a; font-size: 38px; font-weight: 900; text-shadow: 0 0 15px red; margin: 15px 0 5px 0; }
  .sub { color: #999; font-size: 18px; margin-bottom: 20px; text-align: left; }
  .card {
    background: #111111 !important;
    border-radius: 20px; padding: 20px; margin: 18px 0;
    border: 1px solid #222;
  }
  .card h2 { color: #cc0000; margin: 0 0 12px 0; font-size: 22px; }
  .card p, .card li { color: #e0e0e0 !important; }
  .btn-green { background: #00ff88; color: #000; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; }
  input, textarea { width: 100%; background: #222 !important; border: 1px solid #333 !important; color: white !important; border-radius: 12px; padding: 12px; margin: 6px 0; }
</style>
</head>
<body>

<div class="logo-wrap">
  <img src="logo.png" alt="Ghost Dark Circle Spike Black">
</div>

<h1>GHOST DARK CIRCLE</h1>
<div class="sub">Muro oficial de Spike Black</div>

<div class="card">
  <h2>👻 Bienvenido al Dark Circle</h2>
  <p>Aquí se junta la música, el muro de fans y la comunidad Dark Circle.</p>
  <button class="btn-green">Seguir en GitHub</button>
</div>

<div class="card">
  <h2>🔥 ¿Qué hay aquí?</h2>
  <p>• Música y proyectos de Spike Black<br>• Muro de mensajes para los fans<br>• Noticias y lanzamientos</p>
</div>

<div class="card">
  <h2>📢 MURO DE SPIKE</h2>
  <input type="text" id="nombreInput" placeholder="Tu nombre / AKA">
  <textarea id="mensajeInput" placeholder="Publica algo..."></textarea>
  <button onclick="enviarFirma()" style="width:100%;padding:12px;background:red;color:white;border:none;border-radius:10px;font-weight:bold;margin-top:8px;">FIRMAR</button>
  <div id="visitasPosts" style="margin-top:20px;text-align:left;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyAR7kUWo6MKaOUgFTiuDaQXM5TYbfNcZKU",
  authDomain: "ghost-dark-circle.firebaseapp.com",
  databaseURL: "https://ghost-dark-circle-default-rtdb.firebaseio.com",
  projectId: "ghost-dark-circle",
  storageBucket: "ghost-dark-circle.firebasestorage.app",
  messagingSenderId: "1049315311255",
  appId: "1:1049315311255:web:005c42fbf8bd00bec6b3d2"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const muroRef = ref(db, 'muro_dark_circle');
window.enviarFirma = () => {
  const n = document.getElementById('nombreInput').value.trim();
  const m = document.getElementById('mensajeInput').value.trim();
  if(!n||!m) return alert('Llena todo');
  push(muroRef, { nombre:n, mensaje:m, fecha:Date.now() });
  document.getElementById('nombreInput').value=''; document.getElementById('mensajeInput').value='';
};
onValue(muroRef, (snap) => {
  const c = document.getElementById('visitasPosts');
  c.innerHTML=''; const d=snap.val();
  if(!d){c.innerHTML='<p style=color:#888>Sé el primero en firmar 💀</p>';return;}
  Object.values(d).reverse().forEach(f=>{
    c.innerHTML+=`<div style="background:#1a1a1a;padding:10px;border-radius:10px;margin-bottom:10px;border-left:3px solid red;"><b style="color:#ff4444;">${f.nombre}</b><p style="margin:5px 0 0 0;">${f.mensaje}</p></div>`;
  });
});
</script>
</body>
</html>
